<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Gold jewelry item detail page.">
  <title>Item Detail — Anabel's Joyeria</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Volstead&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo" aria-label="Anabel's Joyeria Home">
        <div class="logo-icon" aria-hidden="true">✦</div>
        <div class="logo-text">
          <span class="logo-name">Anabel's Joyeria</span>
          <span class="logo-tagline" data-i18n="logo.tagline">Fine Jewelry</span>
        </div>
      </a>

      <nav class="header-nav" aria-label="Main navigation">
        <a href="index.html" class="nav-link" data-i18n="nav.catalog">Catalog</a>
        <a href="admin.html" class="btn-admin" data-i18n="nav.admin">Admin</a>
        <div class="lang-toggle" role="group" data-i18n-aria="lang.label" aria-label="Language">
          <button class="lang-btn" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="es">ES</button>
        </div>
      </nav>
    </div>
  </header>

  <!-- ── Main ─────────────────────────────────────────────── -->
  <main>
    <div class="container">

      <!-- Back link -->
      <a href="index.html" class="detail-back">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        <span data-i18n="detail.back">Back to Catalog</span>
      </a>

      <!-- Detail layout -->
      <div class="detail-layout">

        <!-- Left: Image -->
        <div>
          <div class="detail-image-wrap" id="detailImageWrap" aria-label="Product image">
            <!-- Injected by app.js -->
          </div>
        </div>

        <!-- Right: Info -->
        <div class="detail-info">

          <div>
            <p class="detail-category" id="detailCategory"></p>
            <h1 class="detail-name" id="detailName"></h1>
          </div>

          <div class="detail-status">
            <span class="status-badge" id="detailBadge"></span>
          </div>

          <hr class="detail-divider">

          <p class="detail-description" id="detailDesc"></p>

          <hr class="detail-divider">

          <!-- Weight + Price specs -->
          <div class="detail-specs">
            <div class="spec-item">
              <div class="spec-label" data-i18n="spec.price">Price</div>
              <div class="spec-value" id="detailPrice"></div>
            </div>
          </div>

          <!-- Contact CTA -->
          <button class="btn-contact" id="requestPurchaseBtn" type="button">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              aria-hidden="true">
              <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/>
              <path d="M3 6h18"/>
              <path d="M16 10a4 4 0 0 1-8 0"/>
            </svg>
            <span data-i18n="detail.request">Request Purchase</span>
          </button>

          <button class="btn-contact btn-secondary-contact" id="contactBtn" type="button">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              aria-hidden="true">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.44 2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6 6l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16.92z"/>
            </svg>
            <span data-i18n="detail.contact">Contact Store to Purchase</span>
          </button>

          <p class="store-note">
            <strong data-i18n="detail.note.title">In-store purchase only.</strong><br>
            <span data-i18n="detail.note.body">Visit us or send a message — we'll hold the item for you.</span>
          </p>

        </div>
      </div>
    </div>
  </main>

  <div id="purchaseRequestModal" class="request-modal" role="dialog" aria-modal="true" aria-labelledby="requestModalTitle">
    <div class="request-modal-box">
      <button type="button" class="request-modal-close" id="requestModalClose" aria-label="Close">&times;</button>
      <h2 id="requestModalTitle" data-i18n="request.title">Request Purchase</h2>
      <p id="requestModalItem" class="request-modal-item"></p>
      <form id="purchaseRequestForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="requestName" data-i18n="request.name">Name</label>
          <input class="form-input" id="requestName" name="name" type="text" required autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label" for="requestPhone" data-i18n="request.phone">Phone Number</label>
          <input class="form-input" id="requestPhone" name="phone" type="tel" required autocomplete="tel">
        </div>
        <p id="requestStatus" class="form-hint" aria-live="polite"></p>
        <button class="btn-primary" type="submit" id="requestSubmitBtn" data-i18n="request.submit">Submit Request</button>
      </form>
    </div>
  </div>

  <!-- ── Footer ───────────────────────────────────────────── -->
  <footer class="site-footer">
    <div class="footer-brand">Anabel's Joyeria</div>
    <p data-i18n="footer.tagline">Browse online &mdash; purchase in person at our store.</p>
    <p style="margin-top:8px;">&copy; <span id="footerYear"></span> Anabel's Joyeria. <span data-i18n="footer.rights">All rights reserved.</span></p>
  </footer>

  <script src="js/config.js?v=20260614-material-numbers"></script>
  <script src="js/i18n.js?v=20260614-material-numbers"></script>
  <script src="js/api.js?v=20260614-material-numbers"></script>
  <script src="js/app.js?v=20260614-material-numbers"></script>
  <script>
    document.getElementById('footerYear').textContent = new Date().getFullYear();
  </script>
</body>
</html>
